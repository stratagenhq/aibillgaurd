[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "aibillguard"
version = "0.1.0"
description = "Track AI API usage in AiBillGuard — add 2 lines, see your costs in real time."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"
keywords = ["openai", "anthropic", "cost", "usage", "tracking"]

[tool.setuptools.packages.find]
where = ["."]
include = ["aibillguard*"]
